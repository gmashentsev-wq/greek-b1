  --bg:#f0f0eb; --surface:#fff; --border:#e0ddd6;

  --bl:#e8f5ee; --blm:#a7d4bb;
  --text:#0f1a15; --t2:#2d4a3a; --muted:#6b7c72;
  --sh:0 1px 4px rgba(13,59,46,.07); --shm:0 4px 16px rgba(13,59,46,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.navbar{background:var(--g1);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:90;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.nav-back{color:rgba(255,255,255,.6);text-decoration:none;font-size:.8rem;padding:.85rem 0;transition:color .15s}
.nav-back:hover{color:#fff}
.nav-logo{color:#fff;padding:.85rem 0}
.nav-logo-text{font-weight:700;font-size:.95rem}
.nav-logo-sub{font-size:.7rem;opacity:.6}

.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1.5rem 4rem}

.top-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;margin-bottom:1.2rem;box-shadow:var(--sh)}
.search{width:100%;padding:.6rem 1rem;font-size:1rem;font-family:inherit;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;margin-bottom:.9rem}
.search:focus{border-color:var(--g3);background:#fff}

.filter-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.pills{display:flex;gap:.4rem;flex-wrap:wrap}
.pill{padding:.28rem .7rem;border-radius:20px;font-size:.73rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--blm);color:var(--g1)}
.pill.active{background:var(--g1);border-color:var(--g1);color:#fff}

.meta{font-size:.75rem;color:var(--muted);margin-top:.7rem}
.meta strong{color:var(--text)}

.sec-hdr{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;margin:1.3rem 0 .4rem;border-bottom:2px solid var(--border)}
.sec-icon{font-size:1.1rem}
.sec-name{font-weight:700;font-size:.95rem;color:var(--g1)}
.sec-cnt{font-size:.7rem;color:var(--muted);margin-left:auto;background:var(--bl);border-radius:12px;padding:.18rem .55rem;font-weight:600}

.vrow{display:flex;align-items:baseline;gap:.6rem;padding:.5rem .8rem;border-radius:8px;background:var(--surface);border:1px solid var(--border);margin-bottom:.3rem}
.vrow:hover{box-shadow:var(--shm);border-color:var(--blm)}
.vgr{font-family:'Noto Serif',serif;font-size:.97rem;font-weight:600;color:var(--text);min-width:170px}
.vru{font-size:.84rem;color:var(--t2)}
.vrow.hidden{display:none}

.sec-block.hidden{display:none}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>

<nav class="navbar">

let activeCat = 'all';

function buildPills() {
  const p = document.getElementById('pills');
  let html = `<button class="pill active" onclick="setCat('all',this)">Все (${VERBS.length})</button>`;
  CATS.forEach(c => {
    const n = VERBS.filter(v => v.c === c.id).length;
    html += `<button class="pill" onclick="setCat('${c.id}',this)">${c.icon} ${c.name} (${n})</button>`;
  });
  p.innerHTML = html;
}

function setCat(id, btn) {
  activeCat = id;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  filter();
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let visible = 0;

  CATS.forEach(c => {
    const block = document.getElementById('sec-' + c.id);
    if (!block) return;
    let secVisible = 0;
    block.querySelectorAll('.vrow').forEach(row => {
      const gr = row.dataset.gr;
      const ru = row.dataset.ru;
      const cat = row.dataset.cat;
      const catOk = activeCat === 'all' || cat === activeCat;
      const qOk = !q || gr.includes(q) || ru.includes(q);
      if (catOk && qOk) {
        row.classList.remove('hidden');
        secVisible++;
        visible++;
      } else {
        row.classList.add('hidden');
      }
    });
    const secBlock = block.closest('.sec-block');
    if (secVisible === 0) secBlock.classList.add('hidden');
    else {
      secBlock.classList.remove('hidden');
      block.previousElementSibling.querySelector('.sec-cnt').textContent = secVisible;
    }
  });

  document.getElementById('meta').innerHTML = `Показано: <strong>${visible}</strong> из <strong>${VERBS.length}</strong>`;
}

function buildList() {
  const list = document.getElementById('list');
  let html = '';
  CATS.forEach(c => {
    const verbs = VERBS.filter(v => v.c === c.id);
    html += `<div class="sec-block">
      <div class="sec-hdr">
        <span class="sec-icon">${c.icon}</span>
        <span class="sec-name">${c.name}</span>
        <span class="sec-cnt">${verbs.length}</span>
      </div>
      <div id="sec-${c.id}">`;
    verbs.forEach(v => {
      html += `<div class="vrow" data-gr="${v.g.toLowerCase()}" data-ru="${v.r.toLowerCase()}" data-cat="${v.c}">
        <span class="vgr">${v.g}</span>
        <span class="vru">${v.r}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  list.innerHTML = html;
}

buildPills();
buildList();
filter();
</script>
